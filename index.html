<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans JP',sans-serif;
    background:
        linear-gradient(180deg,#ff6fb5 0%, #ff9f6e 100%);
    min-height:100vh;
    color:#333;
}

.wrapper{
    max-width:480px;
    margin:0 auto;
    padding:24px 18px 40px;
}

/* =========================
   ロゴエリア
========================= */
.logo-area{
    display:flex;
    justify-content:center;
    margin-bottom:28px;
}

.logo-box{
    width:220px;
    height:90px;
    background:#fff;
    border-radius:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.15);
}

/* SVG差し替え用 */
.logo-box img{
    max-width:85%;
    max-height:70%;
    object-fit:contain;
}

/* =========================
   タイトル
========================= */
.title{
    text-align:center;
    color:#fff;
    margin-bottom:28px;
}

.title h1{
    font-size:1.5rem;
    font-weight:700;
    margin-bottom:6px;
}

.title p{
    font-size:0.9rem;
    opacity:0.9;
}

/* =========================
   メニュー
========================= */
.menu{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.menu-card{
    background:#fff;
    border-radius:28px;
    padding:22px;
    text-decoration:none;
    color:#333;
    display:flex;
    align-items:center;
    gap:18px;
    box-shadow:
        0 12px 30px rgba(0,0,0,0.12);

    transition:
        transform 0.15s ease,
        box-shadow 0.15s ease;
}

.menu-card:active{
    transform:scale(0.97);
}

.icon{
    width:72px;
    height:72px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.icon svg{
    width:38px;
    height:38px;
}

/* カード別カラー */
.sales-input .icon{
    background:linear-gradient(135deg,#ff5fa2,#ff8f70);
}

.sales-list .icon{
    background:linear-gradient(135deg,#4facfe,#00c6fb);
}

.card-text{
    flex:1;
}

.card-text h2{
    font-size:1.1rem;
    margin-bottom:6px;
}

.card-text p{
    font-size:0.82rem;
    color:#777;
    line-height:1.5;
}

.arrow{
    font-size:1.4rem;
    color:#bbb;
}

/* =========================
   フッター
========================= */
.footer{
    text-align:center;
    color:rgba(255,255,255,0.85);
    font-size:0.75rem;
    margin-top:28px;
}
</style>
</head>
